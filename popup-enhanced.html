<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=400, height=600">
  <title>TextFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Premium color palette */
      --bg-primary: #0f0f14;
      --bg-secondary: #16161d;
      --bg-tertiary: #1e1e28;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);

      /* Accent gradient */
      --accent-start: #6366f1;
      --accent-end: #a855f7;
      --accent-glow: rgba(99, 102, 241, 0.15);

      /* Text */
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-muted: rgba(255, 255, 255, 0.55);
      /* Improved for WCAG AA */

      /* Borders */
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(99, 102, 241, 0.3);

      /* Status */
      --success: #22c55e;
      --warning: #f59e0b;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 380px;
      height: 520px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ===== HEADER ===== */
    .header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-subtle);
      background: linear-gradient(180deg, rgba(99, 102, 241, 0.08) 0%, transparent 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
    }

    .brand-name {
      font-weight: 600;
      font-size: 16px;
      letter-spacing: -0.02em;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #4ade80;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .icon-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      border-color: var(--border-accent);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    /* ===== SEARCH ===== */
    .search-section {
      padding: 16px 20px;
    }

    .search-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s ease;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      border-color: var(--accent-start);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .search-hint {
      position: absolute;
      right: 12px;
      padding: 4px 8px;
      background: var(--bg-tertiary);
      border-radius: 6px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }

    /* ===== CONTENT ===== */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px;
    }

    .content::-webkit-scrollbar {
      width: 4px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: var(--border-subtle);
      border-radius: 2px;
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 20px;
    }

    .empty-illustration {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      position: relative;
    }

    .empty-circle {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .empty-circle svg {
      width: 48px;
      height: 48px;
      color: var(--accent-start);
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .empty-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      max-width: 260px;
    }

    /* ===== SNIPPET CARDS ===== */
    .snippet-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-bottom: 16px;
    }

    .snippet-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .snippet-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-accent);
      transform: translateY(-1px);
    }

    .snippet-shortcut {
      padding: 6px 10px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(168, 85, 247, 0.15));
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #a5b4fc;
    }

    .snippet-info {
      flex: 1;
      min-width: 0;
    }

    .snippet-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .snippet-preview {
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .snippet-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .snippet-card:hover .snippet-actions {
      opacity: 1;
    }

    .snippet-action {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .snippet-action:hover {
      background: var(--accent-start);
      color: white;
    }

    .snippet-action.delete:hover {
      background: #ef4444;
    }

    .snippet-action svg {
      width: 14px;
      height: 14px;
    }

    /* ===== FOOTER ===== */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border-subtle);
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
      border-color: var(--border-accent);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      color: white;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    /* ===== KEYBOARD HINTS ===== */
    .kbd-hints {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px;
      background: var(--bg-primary);
      border-top: 1px solid var(--border-subtle);
    }

    .kbd-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    kbd {
      padding: 2px 6px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      font-family: inherit;
      font-size: 10px;
    }

    /* ===== TOAST ===== */
    .toast-container {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      z-index: 1000;
    }

    .toast {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      animation: slideUp 0.3s ease;
    }

    .toast.show {
      display: flex;
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      color: var(--success);
    }

    .toast-message {
      flex: 1;
      font-size: 13px;
      color: var(--text-primary);
    }

    .toast-action {
      padding: 4px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-start);
      cursor: pointer;
    }

    .toast-action:hover {
      background: var(--bg-card-hover);
    }

    /* ===== SKELETON LOADING ===== */
    .skeleton {
      background: linear-gradient(90deg,
          var(--bg-tertiary) 25%,
          var(--bg-card-hover) 50%,
          var(--bg-tertiary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .skeleton-card {
      height: 62px;
      margin-bottom: 8px;
    }

    .hidden {
      display: none !important;
    }

    /* Light mode support */
    @media (prefers-color-scheme: light) {
      :root {
        --bg-primary: #ffffff;
        --bg-secondary: #f8f9fa;
        --bg-tertiary: #f1f3f5;
        --bg-card: rgba(0, 0, 0, 0.02);
        --bg-card-hover: rgba(0, 0, 0, 0.04);
        --text-primary: #1a1a2e;
        --text-secondary: rgba(26, 26, 46, 0.7);
        --text-muted: rgba(26, 26, 46, 0.5);
        --border-subtle: rgba(0, 0, 0, 0.08);
      }
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="brand">
      <div class="logo">T</div>
      <span class="brand-name">TextFlow</span>
    </div>
    <div class="header-actions">
      <div class="status-pill" id="status-badge">
        <span class="status-dot"></span>
        Active
      </div>
      <button class="icon-btn" id="settings-btn" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3" />
          <path
            d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
      </button>
    </div>
  </header>

  <!-- Search -->
  <div class="search-section">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search snippets..." autocomplete="off">
      <span class="search-hint">/</span>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <!-- Loading State -->
    <div id="loading" class="snippet-list">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-illustration">
        <div class="empty-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 3v18M3 12h18M7.5 7.5l9 9M16.5 7.5l-9 9" />
          </svg>
        </div>
      </div>
      <h3 class="empty-title">No snippets yet</h3>
      <p class="empty-desc">Create your first snippet to start expanding text faster</p>
    </div>

    <!-- Snippet List -->
    <div id="snippets-list" class="snippet-list hidden"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn btn-secondary" id="dashboard-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
      </svg>
      Dashboard
    </button>
    <button class="btn btn-primary" id="new-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19" />
        <line x1="5" y1="12" x2="19" y2="12" />
      </svg>
      New Snippet
    </button>
  </div>

  <!-- Keyboard Hints -->
  <div class="kbd-hints">
    <span class="kbd-hint"><kbd>↑↓</kbd> Navigate</span>
    <span class="kbd-hint"><kbd>Enter</kbd> Copy</span>
    <span class="kbd-hint"><kbd>Esc</kbd> Close</span>
  </div>

  <!-- Toast -->
  <div class="toast-container">
    <div class="toast" id="toast">
      <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
        <polyline points="22 4 12 14.01 9 11.01" />
      </svg>
      <span class="toast-message" id="toast-message"></span>
      <button class="toast-action hidden" id="toast-action">Undo</button>
    </div>
  </div>

  <script src="popup-enhanced.js"></script>
</body>

</html>
